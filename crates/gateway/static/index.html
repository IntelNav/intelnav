<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IntelNav · swarm demo</title>
<style>
  /* ---------- design tokens ---------- */
  :root {
    --bg:        #0e0f12;
    --panel:     #15171b;
    --panel-hi:  #1c1f24;
    --border:    #2a2d33;
    --border-hi: #3b3f47;
    --text:      #e6e6e6;
    --subtle:    #8a8e96;
    --inactive:  #5a5e66;

    --intel:        #d97757;   /* primary brand */
    --intel-lit:    #ffb089;
    --you:          #7ab4e8;
    --sys:          #808080;
    --success:      #4eba65;
    --warning:      #ffc107;
    --error:        #ff6b80;
    --network:      #79d5e6;
    --volunteer:    #4eba65;
    --cloud:        #c88de8;
    --gateway:      #ffb089;

    --radius: 6px;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100%;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100vh;
  }

  /* ---------- header ---------- */
  header {
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
  }
  header .brand {
    color: var(--intel);
    font-weight: 700;
    letter-spacing: 0.4px;
    font-family: var(--mono);
  }
  header .pipe { color: var(--inactive); }
  header .label { color: var(--subtle); }
  header .value { color: var(--text); font-family: var(--mono); }
  header .badge {
    color: var(--bg);
    background: var(--success);
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 11px;
    margin-left: auto;
  }

  /* ---------- main two-pane ---------- */
  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 12px;
    min-height: 0;
  }
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: grid;
    grid-template-rows: auto 1fr auto;
    min-height: 0;
  }
  .panel-head {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--subtle);
    font-size: 12px;
    font-family: var(--mono);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-head .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--inactive);
  }
  .panel-head .dot.live { background: var(--intel-lit); box-shadow: 0 0 8px var(--intel); }

  /* ---------- chat panel ---------- */
  .transcript {
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-height: 0;
  }
  .turn { display: grid; grid-template-columns: 56px 1fr; gap: 8px; }
  .turn .tag {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    padding-top: 2px;
  }
  .turn.you   .tag { color: var(--you); }
  .turn.intel .tag { color: var(--intel); }
  .turn.sys   .tag { color: var(--sys); font-style: italic; }
  .turn .body {
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .turn pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 2px solid var(--inactive);
    padding: 10px 12px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 12.5px;
    overflow-x: auto;
    margin: 6px 0;
  }
  .turn .cursor {
    display: inline-block;
    width: 7px; height: 14px;
    background: var(--intel-lit);
    margin-left: 1px;
    vertical-align: middle;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .composer {
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
  }
  .composer textarea {
    background: var(--panel-hi);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 10px;
    font-family: var(--sans);
    font-size: 14px;
    resize: vertical;
    min-height: 44px;
    max-height: 180px;
    outline: none;
  }
  .composer textarea:focus { border-color: var(--intel); }
  .composer button {
    background: var(--intel);
    color: var(--bg);
    border: none;
    border-radius: 4px;
    font-weight: 600;
    padding: 0 16px;
    cursor: pointer;
    font-family: var(--sans);
    font-size: 13px;
  }
  .composer button:disabled { opacity: 0.4; cursor: default; }
  .composer button:hover:not(:disabled) { background: var(--intel-lit); }

  /* ---------- topology panel ---------- */
  .topo {
    overflow-y: auto;
    padding: 12px;
    min-height: 0;
  }
  .topo-section { margin-bottom: 18px; }
  .topo-section h3 {
    margin: 0 0 8px 0;
    font-size: 12px;
    color: var(--subtle);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    font-family: var(--mono);
    font-weight: 500;
  }

  .stage {
    background: var(--panel-hi);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 18px 14px;
    min-height: 220px;
    position: relative;
  }
  .stage svg { width: 100%; height: 220px; }

  .node-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 8px;
  }
  .node {
    background: var(--panel-hi);
    border: 1px solid var(--border);
    border-left: 3px solid var(--inactive);
    border-radius: 4px;
    padding: 8px 10px;
    font-size: 12px;
  }
  .node.gateway   { border-left-color: var(--gateway); }
  .node.volunteer { border-left-color: var(--volunteer); }
  .node.cloud     { border-left-color: var(--cloud); }
  .node .id {
    font-family: var(--mono);
    color: var(--text);
    font-size: 12.5px;
  }
  .node .meta {
    color: var(--subtle);
    font-size: 11px;
    font-family: var(--mono);
    margin-top: 2px;
  }
  .node .models {
    color: var(--subtle);
    font-size: 10.5px;
    font-family: var(--mono);
    margin-top: 4px;
    line-height: 1.4;
  }

  .empty {
    color: var(--inactive);
    font-style: italic;
    padding: 20px;
    text-align: center;
    font-size: 13px;
  }

  .footer {
    padding: 6px 12px;
    border-top: 1px solid var(--border);
    color: var(--subtle);
    font-size: 11px;
    font-family: var(--mono);
    display: flex;
    justify-content: space-between;
  }
  .footer .ok { color: var(--success); }
  .footer .warn { color: var(--warning); }
  .footer .err { color: var(--error); }
</style>
</head>
<body>

<header>
  <span class="brand">IntelNav</span>
  <span class="pipe">·</span>
  <span class="label">model</span>
  <span class="value" id="hdr-model">—</span>
  <span class="pipe">·</span>
  <span class="label">peers</span>
  <span class="value" id="hdr-peers">0</span>
  <span class="pipe">·</span>
  <span class="label">uptime</span>
  <span class="value" id="hdr-uptime">0s</span>
  <span class="badge" id="hdr-status">live</span>
</header>

<main>
  <!-- chat -->
  <section class="panel" aria-label="chat">
    <div class="panel-head">
      <span class="dot" id="chat-dot"></span>
      chat · /v1/chat/completions
    </div>
    <div class="transcript" id="transcript">
      <div class="turn sys">
        <div class="tag">sys</div>
        <div class="body">Connected. Pick a model in the swarm view, then ask anything below.</div>
      </div>
    </div>
    <form class="composer" id="composer">
      <textarea id="prompt" placeholder="Write me a haiku about TCP." rows="2" autofocus></textarea>
      <button type="submit" id="send">Send</button>
    </form>
  </section>

  <!-- topology -->
  <section class="panel" aria-label="swarm">
    <div class="panel-head">
      <span class="dot" id="swarm-dot"></span>
      swarm · /v1/swarm/topology
    </div>
    <div class="topo">
      <div class="topo-section">
        <h3>chain</h3>
        <div class="stage">
          <svg id="stage" viewBox="0 0 600 220" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
      </div>

      <div class="topo-section">
        <h3>peers</h3>
        <div class="node-list" id="peers"></div>
      </div>

      <div class="topo-section">
        <h3>models</h3>
        <div class="node-list" id="models"></div>
      </div>
    </div>
    <div class="footer">
      <span id="topo-status" class="ok">refreshed —s ago</span>
      <span id="topo-error"></span>
    </div>
  </section>
</main>

<script>
'use strict';

// ----------------------------------------------------------------------
//  state
// ----------------------------------------------------------------------
const state = {
  topology: null,
  history:  [],            // [{role, content}]
  streaming: false,
  lastTopoAt: 0,
};

// ----------------------------------------------------------------------
//  topology poll loop
// ----------------------------------------------------------------------
async function pollTopology() {
  try {
    const r = await fetch('/v1/swarm/topology', { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    state.topology = await r.json();
    state.lastTopoAt = Date.now();
    renderTopology();
    document.getElementById('topo-error').textContent = '';
    document.getElementById('topo-status').className = 'ok';
  } catch (e) {
    document.getElementById('topo-error').textContent = 'topology: ' + e.message;
    document.getElementById('topo-status').className = 'err';
  }
}

function refreshTopologyAge() {
  const age = Math.max(0, Math.round((Date.now() - state.lastTopoAt) / 1000));
  document.getElementById('topo-status').textContent =
    state.lastTopoAt === 0 ? 'connecting…' : `refreshed ${age}s ago`;
}

// ----------------------------------------------------------------------
//  render — header + nodes + chain stage
// ----------------------------------------------------------------------
function renderTopology() {
  const t = state.topology;
  if (!t) return;

  // header summary
  document.getElementById('hdr-peers').textContent = String(t.peers.length);
  document.getElementById('hdr-uptime').textContent = formatUptime(t.uptime_sec);
  const firstModel = t.models[0] || (t.peers[0] && t.peers[0].models[0]) || '—';
  document.getElementById('hdr-model').textContent = firstModel;

  // peers list
  const peersEl = document.getElementById('peers');
  peersEl.innerHTML = '';
  if (t.peers.length === 0) {
    peersEl.innerHTML = '<div class="empty">no peers discovered yet — start a peer with <code>intelnav node</code></div>';
  } else {
    for (const p of t.peers) {
      peersEl.appendChild(renderNode(p));
    }
  }

  // models list
  const modelsEl = document.getElementById('models');
  modelsEl.innerHTML = '';
  if (t.models.length === 0) {
    modelsEl.innerHTML = '<div class="empty">no models advertised by peers</div>';
  } else {
    for (const m of t.models) {
      const el = document.createElement('div');
      el.className = 'node';
      el.innerHTML = `<div class="id">${escapeHtml(m)}</div>
                      <div class="meta">${countProvidersFor(m, t.peers)} provider(s)</div>`;
      modelsEl.appendChild(el);
    }
  }

  // chain stage
  drawChain(t);
}

function renderNode(n) {
  const el = document.createElement('div');
  el.className = 'node ' + (n.kind || 'volunteer');
  const tps = n.tok_per_s ? n.tok_per_s.toFixed(1) + ' tok/s' : '—';
  const models = n.models.length ? n.models.slice(0, 2).map(escapeHtml).join(', ')
                                 : '<span style="color:var(--inactive)">no models advertised</span>';
  const tail = n.models.length > 2 ? ' (+' + (n.models.length - 2) + ' more)' : '';
  el.innerHTML = `
    <div class="id">${escapeHtml(n.id)}</div>
    <div class="meta">${escapeHtml(n.kind)} · ${escapeHtml(n.addr || '?')} · ${tps} · ${escapeHtml(n.source)}</div>
    <div class="models">${models}${tail}</div>
  `;
  return el;
}

function countProvidersFor(model, peers) {
  return peers.reduce((acc, p) => acc + (p.models.includes(model) ? 1 : 0), 0);
}

// ----------------------------------------------------------------------
//  chain stage — gateway in the middle, peers around it
// ----------------------------------------------------------------------
function drawChain(t) {
  const svg = document.getElementById('stage');
  svg.innerHTML = '';

  const W = 600, H = 220;
  const gx = W / 2, gy = H / 2;

  // gateway hub
  drawNode(svg, gx, gy, 'gateway', t.gateway.id, 'var(--gateway)', state.streaming);

  if (t.peers.length === 0) {
    drawText(svg, gx, gy + 56, 'awaiting peers…', 'var(--inactive)');
    return;
  }

  // peers in a circle
  const R = Math.min(80, 30 + t.peers.length * 6);
  const radius = Math.max(70, Math.min(95, R));
  const peers = t.peers.slice(0, 8);                       // cap visual clutter
  for (let i = 0; i < peers.length; i++) {
    const angle = (i / peers.length) * Math.PI * 2 - Math.PI / 2;
    const px = gx + radius * Math.cos(angle);
    const py = gy + radius * Math.sin(angle);

    // edge first (so node draws over it)
    drawEdge(svg, gx, gy, px, py, state.streaming);
    const color = peers[i].kind === 'cloud' ? 'var(--cloud)' : 'var(--volunteer)';
    drawNode(svg, px, py, peers[i].kind, peers[i].id, color, false);
  }
  if (t.peers.length > 8) {
    drawText(svg, gx, H - 8, '+' + (t.peers.length - 8) + ' more', 'var(--inactive)');
  }
}

function drawNode(svg, x, y, kind, label, color, pulse) {
  const ns = 'http://www.w3.org/2000/svg';
  const g  = document.createElementNS(ns, 'g');
  const c  = document.createElementNS(ns, 'circle');
  c.setAttribute('cx', x); c.setAttribute('cy', y);
  c.setAttribute('r', kind === 'gateway' ? 18 : 12);
  c.setAttribute('fill', '#15171b');
  c.setAttribute('stroke', color);
  c.setAttribute('stroke-width', '2');
  if (pulse) {
    const a = document.createElementNS(ns, 'animate');
    a.setAttribute('attributeName', 'r');
    a.setAttribute('values', `${kind === 'gateway' ? 18 : 12};${kind === 'gateway' ? 22 : 16};${kind === 'gateway' ? 18 : 12}`);
    a.setAttribute('dur', '1.2s'); a.setAttribute('repeatCount', 'indefinite');
    c.appendChild(a);
  }
  g.appendChild(c);

  const t = document.createElementNS(ns, 'text');
  t.setAttribute('x', x); t.setAttribute('y', y + (kind === 'gateway' ? 36 : 28));
  t.setAttribute('text-anchor', 'middle');
  t.setAttribute('fill', '#8a8e96');
  t.setAttribute('font-family', 'ui-monospace, monospace');
  t.setAttribute('font-size', '10');
  t.textContent = label.length > 12 ? label.slice(0, 11) + '…' : label;
  g.appendChild(t);
  svg.appendChild(g);
}

function drawEdge(svg, x1, y1, x2, y2, animated) {
  const ns = 'http://www.w3.org/2000/svg';
  const ln = document.createElementNS(ns, 'line');
  ln.setAttribute('x1', x1); ln.setAttribute('y1', y1);
  ln.setAttribute('x2', x2); ln.setAttribute('y2', y2);
  ln.setAttribute('stroke', animated ? 'var(--intel)' : 'var(--border-hi)');
  ln.setAttribute('stroke-width', '1.5');
  if (animated) {
    ln.setAttribute('stroke-dasharray', '4,4');
    const a = document.createElementNS(ns, 'animate');
    a.setAttribute('attributeName', 'stroke-dashoffset');
    a.setAttribute('values', '0;-16');
    a.setAttribute('dur', '0.6s'); a.setAttribute('repeatCount', 'indefinite');
    ln.appendChild(a);
  }
  svg.appendChild(ln);
}

function drawText(svg, x, y, text, color) {
  const ns = 'http://www.w3.org/2000/svg';
  const t = document.createElementNS(ns, 'text');
  t.setAttribute('x', x); t.setAttribute('y', y);
  t.setAttribute('text-anchor', 'middle');
  t.setAttribute('fill', color);
  t.setAttribute('font-family', 'ui-monospace, monospace');
  t.setAttribute('font-size', '11');
  t.textContent = text;
  svg.appendChild(t);
}

// ----------------------------------------------------------------------
//  chat
// ----------------------------------------------------------------------
const composer  = document.getElementById('composer');
const promptEl  = document.getElementById('prompt');
const sendBtn   = document.getElementById('send');
const transEl   = document.getElementById('transcript');
const chatDot   = document.getElementById('chat-dot');
const swarmDot  = document.getElementById('swarm-dot');

composer.addEventListener('submit', e => { e.preventDefault(); send(); });
promptEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

async function send() {
  const text = promptEl.value.trim();
  if (!text || state.streaming) return;
  promptEl.value = '';
  pushTurn('you', text);
  state.history.push({ role: 'user', content: text });

  const open = pushTurn('intel', '', true);   // streaming-open turn
  state.streaming = true;
  chatDot.classList.add('live');
  sendBtn.disabled = true;

  try {
    await streamCompletion(open);
  } catch (e) {
    open.body.textContent = '⚠ ' + e.message;
    open.body.style.color = 'var(--error)';
  } finally {
    state.streaming = false;
    chatDot.classList.remove('live');
    sendBtn.disabled = false;
    state.history.push({ role: 'assistant', content: open.body.textContent });
  }
}

async function streamCompletion(open) {
  const t = state.topology;
  const model = (t && (t.models[0] || (t.peers[0] && t.peers[0].models[0]))) || 'default';
  const resp = await fetch('/v1/chat/completions', {
    method:  'POST',
    headers: { 'content-type': 'application/json' },
    body:    JSON.stringify({
      model,
      messages: state.history,
      stream:   true,
    }),
  });
  if (!resp.ok) {
    const txt = await resp.text();
    throw new Error('HTTP ' + resp.status + ': ' + txt);
  }

  const reader  = resp.body.getReader();
  const decoder = new TextDecoder();
  let   buf     = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });

    // SSE frames are separated by a blank line.
    let idx;
    while ((idx = buf.indexOf('\n\n')) !== -1) {
      const frame = buf.slice(0, idx);
      buf = buf.slice(idx + 2);
      handleSseFrame(frame, open);
    }
  }
  open.body.querySelector('.cursor')?.remove();
}

function handleSseFrame(frame, open) {
  // OpenAI-shape SSE: lines like `data: {…}` or `data: [DONE]`.
  for (const line of frame.split('\n')) {
    if (!line.startsWith('data:')) continue;
    const payload = line.slice(5).trim();
    if (payload === '[DONE]') return;
    try {
      const obj = JSON.parse(payload);
      const delta = obj.choices?.[0]?.delta?.content;
      if (delta) {
        const cur = open.body.querySelector('.cursor');
        if (cur) cur.remove();
        open.body.append(document.createTextNode(delta));
        const c = document.createElement('span');
        c.className = 'cursor';
        open.body.appendChild(c);
        transEl.scrollTop = transEl.scrollHeight;
      }
    } catch { /* ignore non-JSON heartbeats */ }
  }
}

function pushTurn(role, text, streaming = false) {
  const wrap = document.createElement('div');
  wrap.className = 'turn ' + role;
  const tag = document.createElement('div');
  tag.className = 'tag';
  tag.textContent = role === 'you' ? 'you' : role === 'sys' ? 'sys' : 'intel';
  const body = document.createElement('div');
  body.className = 'body';
  if (streaming) {
    const c = document.createElement('span');
    c.className = 'cursor';
    body.appendChild(c);
  } else {
    body.textContent = text;
  }
  wrap.appendChild(tag);
  wrap.appendChild(body);
  transEl.appendChild(wrap);
  transEl.scrollTop = transEl.scrollHeight;
  return { wrap, body };
}

// ----------------------------------------------------------------------
//  helpers
// ----------------------------------------------------------------------
function formatUptime(s) {
  if (s < 60) return s + 's';
  if (s < 3600) return Math.round(s / 60) + 'm';
  if (s < 86400) return Math.round(s / 3600) + 'h';
  return Math.round(s / 86400) + 'd';
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

// ----------------------------------------------------------------------
//  boot
// ----------------------------------------------------------------------
pollTopology();
setInterval(pollTopology, 3000);
setInterval(refreshTopologyAge, 1000);
</script>
</body>
</html>
